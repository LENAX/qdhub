# Jupyter Lab — jupyter.quantrade.team（Let's Encrypt + 反代 8888）
#
# 部署：sudo cp deploy/jupyter.conf /etc/nginx/conf.d/jupyter.conf && sudo nginx -t && sudo systemctl reload nginx
# 勿加 default_server（由 qdhub.conf 占用）；Jupyter 侧 export JUPYTER_BASE_URL=/，见 jupyter_server_config.py
#
# 证书：sudo certbot certonly --nginx -d jupyter.quantrade.team
# 续期由 certbot timer 负责；若 80 仅 301 导致续期失败，需在 80 段于 return 前放行
# location ^~ /.well-known/acme-challenge/ { root /var/www/html; default_type text/plain; }

# HTTP → HTTPS
server {
    listen 80;
    server_name jupyter.quantrade.team;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name jupyter.quantrade.team;

    ssl_certificate     /etc/letsencrypt/live/jupyter.quantrade.team/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jupyter.quantrade.team/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        send_timeout       86400s;
    }
}
