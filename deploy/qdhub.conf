# QDHub 主站 Nginx（域名 qdhub.quantrade.team + Let's Encrypt）
# 与服务器 /etc/nginx/conf.d/qdhub.conf 保持一致；证书由 certbot 签发/续期。
# 本地无 certbot 时：勿直接 nginx -t；若报找不到 ssl-dhparams.pem，可注释下方 ssl_dhparam 行。
#
# 80 端口：全部跳转到 HTTPS
server {
    listen 80 default_server;
    server_name qdhub_http_redirect;

    return 301 https://$host$request_uri;
}

# 443：HTTPS 反代（证书 CN/SAN 为 qdhub.quantrade.team，勿用裸 IP 访问以免浏览器告警）
server {
    listen 443 ssl http2 default_server;
    server_name qdhub.quantrade.team;

    ssl_certificate     /etc/letsencrypt/live/qdhub.quantrade.team/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qdhub.quantrade.team/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # 可按需调整上传体积限制
    client_max_body_size 20m;

    # ========= SSE 专用 location（必须放在 /api/ 之前）=========
    location ~ ^/api/v1/sync-plan/.*/progress-stream$ {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;

        chunked_transfer_encoding off;
        gzip off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        send_timeout       3600s;
    }

    # ========= WebSocket（必须在 /api/ 之前；勿对 WS 使用 Connection ""）=========
    location /api/v1/ws/ {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        send_timeout       3600s;
    }

    # ========= 普通后端 API =========
    location /api/ {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========= 前端（SPA） =========
    location / {
        proxy_pass http://127.0.0.1:3001;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}