# 80 端口：全部跳转到 HTTPS
server {
    listen 80 default_server;
    server_name qdhub_http_redirect;

    return 301 https://$host$request_uri;
}

# 443 端口：实际服务（IP 访问）
server {
    listen 443 ssl http2 default_server;
    server_name _;

    # 自签名证书路径（刚才生成的）
    ssl_certificate     /etc/nginx/selfsigned/selfsigned.crt;
    ssl_certificate_key /etc/nginx/selfsigned/selfsigned.key;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # 可按需调整上传体积限制
    client_max_body_size 20m;

    # ========= SSE 专用 location（必须放在 /api/ 之前）=========
    location ~ ^/api/v1/sync-plan/.*/progress-stream$ {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;

        chunked_transfer_encoding off;
        gzip off;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        send_timeout       3600s;
    }

    # ========= 普通后端 API =========
    location /api/ {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========= 前端（SPA） =========
    location / {
        proxy_pass http://127.0.0.1:3001;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}