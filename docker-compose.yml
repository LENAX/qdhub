# QDHub - base compose (production or default)
# Dev with hot reload: use docker-compose.override.yml (auto-merged when present)
# 发布镜像：本地 build 后 push；阿里云上只 pull + up，无需源码（见 DEPLOY.md）
# 版本号：与代码库 tag 一致，如 IMAGE_TAG=v0.1.0-beta.2
services:
  backend:
    image: ${DOCKER_REGISTRY:-}qdhub-backend:${IMAGE_TAG:-latest}
    pull_policy: always
    build:
      context: ./qdhub
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    # 8G 整机基线；仅跑 backend 或更大内存时可提高 mem_limit / 放宽 QDHUB_SYNC_*
    mem_limit: 6g
    memswap_limit: 6g
    environment:
      - QDHUB_SERVER_HOST=0.0.0.0
      - QDHUB_SERVER_PORT=8080
      - GOMEMLIMIT=${GOMEMLIMIT:-5GiB}
      - QDHUB_SYNC_MEM_HIGH_MB=${QDHUB_SYNC_MEM_HIGH_MB:-2048}
      - QDHUB_SYNC_MEM_CRITICAL_MB=${QDHUB_SYNC_MEM_CRITICAL_MB:-4096}
      - QDHUB_SUBTASK_BATCH_PAUSE_HIGH_MS=${QDHUB_SUBTASK_BATCH_PAUSE_HIGH_MS:-100}
      - QDHUB_SUBTASK_BATCH_PAUSE_CRITICAL_MS=${QDHUB_SUBTASK_BATCH_PAUSE_CRITICAL_MS:-400}
    volumes:
      # Persist SQLite + DuckDB data and logs
      - ${QDHUB_DATA_DIR:-./qdhub/data}:/app/data
      - ${QDHUB_LOG_DIR:-./qdhub/logs}:/app/logs
      # 可选：ts_proxy 公钥目录（内含 public.pem）→ 容器 /root/.key（与迁移默认 rsa_public_key_path 一致）
      - ${QDHUB_KEY_DIR:-./qdhub/keys}:/root/.key:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: ${DOCKER_REGISTRY:-}qdhub-frontend:${IMAGE_TAG:-latest}
    pull_policy: always
    build:
      context: ./qdhub-frontend
      dockerfile: Dockerfile
    ports:
      - "3001:80"   # 宿主机 3001，由 ECS 上 Nginx 反代 80/443 → 3001
    depends_on:
      backend:
        condition: service_healthy
