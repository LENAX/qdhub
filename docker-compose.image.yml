# 仅用镜像部署，不包含 build，无需源码
# 用法：在阿里云上放本文件 + .env.aliyun，执行 pull + up；IMAGE_TAG 与构建时一致（如 v0.1.0-beta.2）
services:
  backend:
    image: ${DOCKER_REGISTRY:?err}qdhub-backend:${IMAGE_TAG:-latest}
    pull_policy: always
    ports:
      - "8080:8080"
    # 8G 整机：backend 约 6G 上限，余量给 OS / 前端 / page cache；可按机器调 QDHUB_SYNC_* / GOMEMLIMIT
    mem_limit: 6g
    memswap_limit: 6g
    environment:
      - QDHUB_ENV=production
      - QDHUB_SERVER_HOST=0.0.0.0
      - QDHUB_SERVER_PORT=8080
      - QDHUB_SERVER_ENABLE_SWAGGER=${QDHUB_SERVER_ENABLE_SWAGGER:-false}
      - QDHUB_AUTH_ADMIN_PASSWORD=${QDHUB_AUTH_ADMIN_PASSWORD}
      - GOMEMLIMIT=${GOMEMLIMIT:-5GiB}
      - QDHUB_SYNC_MEM_HIGH_MB=${QDHUB_SYNC_MEM_HIGH_MB:-2048}
      - QDHUB_SYNC_MEM_CRITICAL_MB=${QDHUB_SYNC_MEM_CRITICAL_MB:-4096}
      - QDHUB_SUBTASK_BATCH_PAUSE_HIGH_MS=${QDHUB_SUBTASK_BATCH_PAUSE_HIGH_MS:-100}
      - QDHUB_SUBTASK_BATCH_PAUSE_CRITICAL_MS=${QDHUB_SUBTASK_BATCH_PAUSE_CRITICAL_MS:-400}
      # 实时 tick 经内地 ts_proxy（Tushare 转发）；与 QDHUB_KEY_DIR 挂载的 public.pem 一致。可在 .env 覆盖 TUSHARE_PROXY_WS_URL
      - TUSHARE_REALTIME_SOURCE=${TUSHARE_REALTIME_SOURCE:-forward}
      - TUSHARE_PROXY_WS_URL=${TUSHARE_PROXY_WS_URL:-ws://47.107.235.54:8888/realtime}
      - TUSHARE_PROXY_RSA_PUBLIC_KEY_PATH=${TUSHARE_PROXY_RSA_PUBLIC_KEY_PATH:-/root/.key/public.pem}
    volumes:
      - ${QDHUB_DATA_DIR:-/mnt/vdb/.qdhub/data}:/app/data
      - ${QDHUB_LOG_DIR:-/mnt/vdb/.qdhub/logs}:/app/logs
      # 内地 ts_proxy 公钥：宿主机目录内需有 public.pem；容器内为 /root/.key/public.pem（与默认 realtime_sources 配置一致）
      - ${QDHUB_KEY_DIR:-/mnt/vdb/.qdhub/keys}:/root/.key:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    image: ${DOCKER_REGISTRY:?err}qdhub-frontend:${IMAGE_TAG:-latest}
    pull_policy: always
    ports:
      - "3001:80"   # 宿主机 3001；ECS Nginx 监听 80/443 并反代到 127.0.0.1:3001
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
