# Dev override: hot reload + host SQLite/DuckDB
# Applied automatically when you run: docker compose up
# Production: docker compose -f docker-compose.yml up (no override)

services:
  backend:
    build:
      context: ./qdhub
      dockerfile: Dockerfile.dev
    volumes:
      - ./qdhub:/app
      # 显式映射 data/logs 到本机绝对路径，保证 qdhub.duckdb、qdhub.db 落在本地目录（与 cwd 无关）
      - /Users/stevelan/Desktop/projects/qdhub/qdhub/data:/app/data
      - /Users/stevelan/Desktop/projects/qdhub/qdhub/logs:/app/logs
    # Avoid overwriting container's go mod cache with host (no vendor)
    environment:
      - GOMODCACHE=/go/pkg/mod
    command: ["air", "-c", ".air.toml"]

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./qdhub-frontend:/app
      # Keep node_modules in container to avoid platform mismatch
      - frontend_node_modules:/app/node_modules
    ports:
      - "3001:3000"   # 宿主机 3001，避免与占用 3000 的进程冲突；访问 http://localhost:3001
    environment:
      - VITE_PROXY_TARGET=http://backend:8080
    command: ["sh", "-c", "npm install && npm run dev"]
    depends_on:
      - backend

volumes:
  frontend_node_modules:
