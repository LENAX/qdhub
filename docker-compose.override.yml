# Dev override: hot reload + host SQLite/DuckDB
# Applied automatically when you run: docker compose up
# Production: docker compose -f docker-compose.yml up (no override)

services:
  backend:
    build:
      context: ./qdhub
      dockerfile: Dockerfile.dev
    volumes:
      - ./qdhub:/app
      # Use host data dir so backend sees your local SQLite and DuckDB
      - ./qdhub/data:/app/data
    # Avoid overwriting container's go mod cache with host (no vendor)
    environment:
      - GOMODCACHE=/go/pkg/mod
    command: ["air", "-c", ".air.toml"]

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./qdhub-frontend:/app
      # Keep node_modules in container to avoid platform mismatch
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_PROXY_TARGET=http://backend:8080
    command: ["sh", "-c", "npm install && npm run dev"]
    depends_on:
      - backend

volumes:
  frontend_node_modules:
