# Jupyter Lab 研究环境（与主站 docker-compose 独立）
# 挂载服务器上的 /mnt/data、/mnt/vdb/qdhub，便于做题材/情绪/龙头等课题
# 启动：docker compose -f docker-compose.jupyter.yml up -d
# 修改 JUPYTER_PASSWORD / JUPYTER_BASE_URL 等后：up -d --force-recreate
# 查看 token：docker compose -f docker-compose.jupyter.yml logs jupyter-lab

services:
  jupyter-lab:
    image: ${DOCKER_REGISTRY:-}qdhub-jupyter-lab:${IMAGE_TAG:-latest}
    build:
      context: ./research-env
      dockerfile: Dockerfile
    container_name: qdhub-jupyter-lab
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      # 密码模式：设 JUPYTER_PASSWORD 或 JUPYTER_PASSWORD_HASH（二选一）；勿再设非空的 JUPYTER_TOKEN
      - JUPYTER_PASSWORD=${JUPYTER_PASSWORD:-}
      - JUPYTER_PASSWORD_HASH=${JUPYTER_PASSWORD_HASH:-}
      # 子域名根路径反代时 export JUPYTER_BASE_URL=/；默认 /jupyter/ 与 qdhub.conf 路径一致
      - JUPYTER_BASE_URL=${JUPYTER_BASE_URL:-/jupyter/}
      # 仅无密码时使用；与密码互斥。改 JUPYTER_PASSWORD 后须 --force-recreate 才生效
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-}
    volumes:
      - "${JUPYTER_MOUNT_DATA:-/mnt/data}:/mnt/data:ro"
      - "${JUPYTER_MOUNT_QDHUB:-/mnt/vdb/qdhub}:/mnt/vdb/qdhub:rw"
      # Jupyter Server 配置：用于支持在 nginx 下通过 https://<host>/jupyter/ 访问
      - ./deploy/jupyter_server_config.py:/home/jovyan/.jupyter/jupyter_server_config.py:ro
    restart: unless-stopped
