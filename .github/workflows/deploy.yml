# CI 部署：main 分支 push tag 时自动构建并推送 Docker 镜像到阿里云 ACR
# 镜像 tag 与 Git tag 一致（如 v0.1.0-beta.5）
# 详见 DEPLOY.md 的「CI 构建与推送」章节

name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract image tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./qdhub
          file: ./qdhub/Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/qdhub-backend:${{ steps.tag.outputs.tag }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./qdhub-frontend
          file: ./qdhub-frontend/Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/qdhub-frontend:${{ steps.tag.outputs.tag }}
