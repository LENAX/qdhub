# QDHub Configuration
# Environment: development
# 生产环境建议：server.enable_swagger: false，并设置 auth.admin_password 强密码（或使用环境变量 QDHUB_AUTH_ADMIN_PASSWORD）

server:
  host: "0.0.0.0"
  port: 8080
  # enable_swagger: true   # 默认 true；生产环境设为 false 关闭 /swagger、/docs（或 QDHUB_SERVER_ENABLE_SWAGGER=false）

database:
  driver: "sqlite"  # sqlite | postgres
  dsn: "./data/qdhub.db"

# auth.admin_password: ""  # 可选：覆盖默认 admin 密码（生产环境设强密码；或环境变量 QDHUB_AUTH_ADMIN_PASSWORD）

quantdb:
  duckdb_path: "./data/qdhub.duckdb"

task_engine:
  worker_count: 10  # 降低并发数以控制内存（新闻216任务+实时tick同时运行时32并发导致OOM）
  task_timeout: 60  # seconds

# 本地开发使用内地 ts_proxy 接收实时行情（不触发 Tushare IP 限制）时，填写下面顶层 tushare 的地址与公钥路径
# 公钥路径支持 ~ 或 ~/ 开头，会展开为当前用户 HOME。环境变量可覆盖：tushare_proxy_WS_URL、tushare_proxy_RSA_PUBLIC_KEY_PATH
tushare:
  realtime_source: "forward"
  forward_ws_url: "ws://47.107.235.54:8888/realtime"
  forward_rsa_public_key_path: "~/.key/public.pem"

datasources:
  tushare:
    enabled: true
    base_url: "http://api.tushare.pro"
    doc_url: "https://tushare.pro/document/2"
