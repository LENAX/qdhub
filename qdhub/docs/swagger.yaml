basePath: /api/v1
definitions:
  http.CreateAPISyncStrategyReq:
    properties:
      api_name:
        type: string
      dependencies:
        items:
          type: string
        type: array
      description:
        type: string
      preferred_param:
        description: none/trade_date/ts_code
        type: string
      required_params:
        items:
          type: string
        type: array
      support_date_range:
        type: boolean
    required:
    - api_name
    - preferred_param
    type: object
  http.CreateDataSourceReq:
    properties:
      base_url:
        type: string
      description:
        type: string
      doc_url:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  http.CreateDataStoreReq:
    properties:
      description:
        type: string
      dsn:
        type: string
      name:
        type: string
      storage_path:
        type: string
      type:
        description: duckdb, clickhouse, postgresql
        type: string
    required:
    - name
    - type
    type: object
  http.CreateSyncPlanReq:
    properties:
      cron_expression:
        type: string
      data_source_id:
        type: string
      data_store_id:
        type: string
      description:
        type: string
      name:
        type: string
      selected_apis:
        items:
          type: string
        type: array
    required:
    - data_source_id
    - name
    - selected_apis
    type: object
  http.CreateTablesForDatasourceReq:
    properties:
      data_source_id:
        type: string
      max_tables:
        type: integer
    required:
    - data_source_id
    type: object
  http.ExecutionCallbackReq:
    properties:
      error_message:
        type: string
      execution_id:
        type: string
      record_count:
        type: integer
      success:
        type: boolean
    required:
    - execution_id
    type: object
  http.RefreshMetadataReq:
    properties:
      doc_content:
        description: Optional - workflow fetches from DocURL
        type: string
      doc_type:
        description: Optional - workflow detects type automatically
        type: string
    type: object
  http.Response:
    description: Standard API response wrapper
    properties:
      code:
        example: 0
        type: integer
      data:
        type: object
      message:
        example: success
        type: string
    type: object
  http.SetTokenReq:
    properties:
      expires_at:
        type: string
      token:
        type: string
    required:
    - token
    type: object
  http.TriggerSyncPlanReq:
    properties:
      end_date:
        type: string
      end_time:
        type: string
      start_date:
        type: string
      start_time:
        type: string
      target_db_path:
        type: string
    required:
    - end_date
    - start_date
    - target_db_path
    type: object
  http.UpdateAPISyncStrategyReq:
    properties:
      dependencies:
        items:
          type: string
        type: array
      description:
        type: string
      preferred_param:
        type: string
      required_params:
        items:
          type: string
        type: array
      support_date_range:
        type: boolean
    type: object
  http.UpdateSyncPlanReq:
    properties:
      cron_expression:
        type: string
      data_store_id:
        type: string
      description:
        type: string
      name:
        type: string
      selected_apis:
        items:
          type: string
        type: array
    type: object
host: localhost:8080
info:
  contact:
    email: support@qdhub.example.com
    name: QDHub Support
    url: https://github.com/qdhub/qdhub
  description: |-
    QDHub - Quantitative Data Hub Management System API
    Provides metadata management, automatic table creation, data synchronization, and workflow orchestration.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: QDHub API
  version: "1.0"
paths:
