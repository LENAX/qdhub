      description: Get limit up comparison for today vs previous days
      parameters:
      - description: Today date YYYYMMDD
        in: query
        name: today_date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      security:
      - BearerAuth: []
      summary: Get limit up comparison
      tags:
      - Analysis
  /analysis/limit-up-ladder:
    get:
      consumes:
      - application/json
      description: Get limit up ladder stats for a trade date
      parameters:
      - description: Trade date YYYYMMDD
        in: query
        name: trade_date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      security:
      - BearerAuth: []
      summary: Get limit up ladder
      tags:
      - Analysis
  /analysis/limit-up-list:
    get:
      consumes:
      - application/json
      description: Get paginated limit up stock list for a trade date
      parameters:
      - description: Trade date YYYYMMDD
        in: query
        name: trade_date
        required: true
        type: string
      - default: 100
        description: Limit
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      security:
      - BearerAuth: []
      summary: Get limit up list
      tags:
      - Analysis
  /analysis/market-sentiment:
    get:
      consumes:
      - application/json
      description: 三层情绪（接力/趋势/四象限）加权合成，返回分位分、等级、明细
      parameters:
      - description: 交易日期 YYYYMMDD，空则最新
        in: query
        name: trade_date
        type: string
      - default: balanced
        description: '权重口径: relay|balanced|trend'
        in: query
        name: style
        type: string
      - default: 120
        description: 分位数窗口（交易日）
        in: query
        name: window
        type: integer
      - default: ths
        description: '热股数据源: ths|eastmoney|kpl'
        in: query
        name: hot_src
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      security:
      - BearerAuth: []
      summary: 当日市场情绪
      tags:
      - Analysis
  /analysis/market-sentiment/extremes:
    get:
      consumes:
