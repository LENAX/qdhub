basePath: /api/v1
definitions:
  datastore.ColumnDef:
    properties:
      comment:
        type: string
      default:
        type: string
      name:
        type: string
      nullable:
        type: boolean
      source_type:
        type: string
      target_type:
        type: string
    type: object
  datastore.IndexDef:
    properties:
      columns:
        items:
          type: string
        type: array
      name:
        type: string
      unique:
        type: boolean
    type: object
  http.CreateAPIMetadataReq:
    properties:
      category_id:
        type: string
      data_source_id:
        type: string
      description:
        type: string
      display_name:
        type: string
      endpoint:
        type: string
      name:
        type: string
      permission:
        type: string
      rate_limit:
        $ref: '#/definitions/metadata.RateLimit'
      request_params:
        items:
          $ref: '#/definitions/metadata.ParamMeta'
        type: array
      response_fields:
        items:
          $ref: '#/definitions/metadata.FieldMeta'
        type: array
    required:
    - data_source_id
    - name
    type: object
  http.CreateDataSourceReq:
    properties:
      base_url:
        type: string
      description:
        type: string
      doc_url:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  http.CreateDataStoreReq:
    properties:
      description:
        type: string
      dsn:
        type: string
      name:
        type: string
      storage_path:
        type: string
      type:
        description: duckdb, clickhouse, postgresql
        type: string
    required:
    - name
    - type
    type: object
  http.CreateMappingRuleReq:
    properties:
      data_source_type:
        type: string
      field_pattern:
        type: string
      priority:
        type: integer
      source_type:
        type: string
      target_db_type:
        type: string
      target_type:
        type: string
    required:
    - data_source_type
    - source_type
    - target_db_type
    - target_type
    type: object
  http.CreateSyncJobReq:
    properties:
      api_metadata_id:
        type: string
      cron_expression:
        type: string
      data_store_id:
        type: string
      description:
        type: string
      mode:
        description: full, incremental
        type: string
      name:
        type: string
      param_rules:
        items:
          $ref: '#/definitions/http.ParamRuleReq'
        type: array
      params:
        additionalProperties: true
        type: object
      workflow_def_id:
        type: string
    required:
    - api_metadata_id
    - data_store_id
    - mode
    - name
    - workflow_def_id
    type: object
  http.CreateWorkflowReq:
    properties:
      category:
        description: metadata, sync, datastore
        type: string
      definition_yaml:
        type: string
      description:
        type: string
      is_system:
        type: boolean
      name:
        type: string
    required:
    - category
    - definition_yaml
    - name
    type: object
  http.ExecuteWorkflowReq:
    properties:
      trigger_params:
        additionalProperties: true
        type: object
      trigger_type:
        description: manual, scheduled, event
        type: string
    type: object
  http.ExecutionCallbackReq:
    properties:
      error_message:
        type: string
      execution_id:
        type: string
      record_count:
        type: integer
      success:
        type: boolean
    required:
    - execution_id
    type: object
  http.GenerateSchemaReq:
    properties:
      api_metadata_id:
        type: string
      auto_create:
        type: boolean
      table_name:
        type: string
    required:
    - api_metadata_id
    - table_name
    type: object
  http.ParamRuleReq:
    properties:
      param_name:
        type: string
      rule_config: {}
      rule_type:
        description: date_range, list, fixed
        type: string
    type: object
  http.RefreshMetadataReq:
    properties:
      doc_content:
        type: string
      doc_type:
        type: string
    required:
    - doc_content
    - doc_type
    type: object
  http.Response:
    description: Standard API response wrapper
    properties:
      code:
        example: 0
        type: integer
      data:
        type: object
      message:
        example: success
        type: string
    type: object
  http.RetryTaskReq:
    properties:
      task_instance_id:
        type: string
    required:
    - task_instance_id
    type: object
  http.SetTokenReq:
    properties:
      expires_at:
        type: string
      token:
        type: string
    required:
    - token
    type: object
  http.UpdateAPIMetadataReq:
    properties:
      description:
        type: string
      display_name:
        type: string
      endpoint:
        type: string
      permission:
        type: string
      rate_limit:
        $ref: '#/definitions/metadata.RateLimit'
      request_params:
        items:
          $ref: '#/definitions/metadata.ParamMeta'
        type: array
      response_fields:
        items:
          $ref: '#/definitions/metadata.FieldMeta'
        type: array
    type: object
  http.UpdateDataSourceReq:
    properties:
      base_url:
        type: string
      description:
        type: string
      doc_url:
        type: string
      name:
        type: string
    type: object
  http.UpdateDataStoreReq:
    properties:
      description:
        type: string
      dsn:
        type: string
      name:
        type: string
      storage_path:
        type: string
    type: object
  http.UpdateSchemaReq:
    properties:
      columns:
        items:
          $ref: '#/definitions/datastore.ColumnDef'
        type: array
      indexes:
        items:
          $ref: '#/definitions/datastore.IndexDef'
        type: array
      primary_keys:
        items:
          type: string
        type: array
    type: object
  http.UpdateSyncJobReq:
    properties:
      cron_expression:
        type: string
      description:
        type: string
      mode:
        type: string
      name:
        type: string
      param_rules:
        items:
          $ref: '#/definitions/http.ParamRuleReq'
        type: array
      params:
        additionalProperties: true
        type: object
    type: object
  http.UpdateWorkflowReq:
    properties:
      definition_yaml:
        type: string
      description:
        type: string
      name:
        type: string
    type: object
  metadata.FieldMeta:
    properties:
      description:
        type: string
      is_index:
        type: boolean
      is_primary:
        type: boolean
      name:
        type: string
      type:
        type: string
    type: object
  metadata.ParamMeta:
    properties:
      default:
        type: string
      description:
        type: string
      name:
        type: string
      required:
        type: boolean
      type:
        type: string
    type: object
  metadata.RateLimit:
    properties:
      points_required:
        type: integer
      requests_per_minute:
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    email: support@qdhub.example.com
    name: QDHub Support
    url: https://github.com/qdhub/qdhub
  description: |-
    QDHub - Quantitative Data Hub Management System API
    Provides metadata management, automatic table creation, data synchronization, and workflow orchestration.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: QDHub API
  version: "1.0"
paths:
  /apis:
    post:
      consumes:
      - application/json
      description: Create a new API metadata entry
      parameters:
      - description: API metadata details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.CreateAPIMetadataReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/http.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      summary: Create API metadata
      tags:
      - APIs
  /apis/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a specific API metadata entry
      parameters:
      - description: API metadata ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      summary: Delete API metadata
      tags:
      - APIs
    get:
      consumes:
      - application/json
      description: Get details of a specific API by ID
      parameters:
      - description: API metadata ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      summary: Get API metadata
      tags:
      - APIs
    put:
      consumes:
      - application/json
      description: Update details of a specific API metadata entry
      parameters:
      - description: API metadata ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated API metadata details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.UpdateAPIMetadataReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      summary: Update API metadata
      tags:
      - APIs
  /datasources:
    get:
      consumes:
      - application/json
      description: Get a list of all registered data sources
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      summary: List all data sources
      tags:
      - DataSources
    post:
      consumes:
      - application/json
      description: Register a new data source with its connection details
      parameters:
      - description: Data source details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.CreateDataSourceReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/http.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      summary: Create a new data source
      tags:
      - DataSources
  /datasources/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a specific data source and its associated metadata
      parameters:
      - description: Data source ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      summary: Delete a data source
      tags:
      - DataSources
    get:
      consumes:
      - application/json
      description: Get details of a specific data source by ID
      parameters:
      - description: Data source ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      summary: Get a data source
      tags:
      - DataSources
    put:
      consumes:
      - application/json
      description: Update details of a specific data source
      parameters:
      - description: Data source ID
        in: path
        name: id
        required: true
        type: string
      - description: Updated data source details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.UpdateDataSourceReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
