        required: true
        schema:
          $ref: '#/definitions/http.RefreshMetadataReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "400":
          description: Bad Request
          schema:
