      consumes:
      - application/json
      description: Get token information for a data source (token value is not returned
        for security)
      parameters:
      - description: Data source ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      summary: Get data source token
      tags:
      - DataSources
    post:
      consumes:
      - application/json
      description: Set or update the authentication token for a data source
      parameters:
      - description: Data source ID
        in: path
        name: id
        required: true
        type: string
      - description: Token details
        in: body
        name: request
