definitions:
  contracts.CreateMetricRequest:
    properties:
      metric:
        $ref: '#/definitions/metrics.MetricDef'
    type: object
  contracts.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  contracts.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
      username:
        maxLength: 64
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  contracts.SubmitMetricJobRequest:
    properties:
      end_time:
        type: string
      job_type:
        $ref: '#/definitions/metrics.ComputeJobType'
      priority:
        type: integer
      range_type:
        $ref: '#/definitions/metrics.ComputeRangeType'
      start_time:
        type: string
      target_ids:
        items:
          type: string
        type: array
      trigger_reason:
        type: string
    type: object
  contracts.UpdatePasswordRequest:
    properties:
      new_password:
        minLength: 8
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  http.CreateAPISyncStrategyReq:
    properties:
      api_name:
        type: string
      dependencies:
        items:
          type: string
        type: array
      description:
        type: string
      fixed_param_keys:
        description: keys that cannot be overridden
        items:
          type: string
        type: array
      fixed_params:
        additionalProperties: true
        description: JSON object
        type: object
      preferred_param:
        description: none/trade_date/ts_code
        type: string
      required_params:
        items:
          type: string
        type: array
      support_date_range:
        type: boolean
    required:
    - api_name
    - preferred_param
    type: object
  http.CreateDataSourceReq:
    properties:
      base_url:
        type: string
      description:
        type: string
      doc_url:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  http.CreateDataStoreReq:
    properties:
      description:
        type: string
      dsn:
        type: string
      name:
        type: string
      storage_path:
        type: string
      type:
        description: duckdb, clickhouse, postgresql
        type: string
    required:
    - name
    - type
    type: object
  http.CreateSyncPlanReq:
    properties:
      cron_expression:
        type: string
      data_source_id:
        type: string
      data_store_id:
        type: string
      default_execute_params:
        $ref: '#/definitions/sync.ExecuteParams'
      description:
        type: string
      incremental_mode:
        type: boolean
      incremental_start_date_api:
        type: string
      incremental_start_date_column:
        type: string
      name:
        type: string
      plan_mode:
        description: 'PlanMode: "batch"（默认）或 "realtime"'
        type: string
      pull_interval_seconds:
        description: Pull 间隔（秒），0=默认 60
        type: integer
      schedule_end_cron:
        description: 运行时段：停止 cron
        type: string
      schedule_pause_end_cron:
        description: 午休暂停结束 cron，如 13:00
        type: string
      schedule_pause_start_cron:
        description: 午休暂停开始 cron，如 11:30
        type: string
      schedule_start_cron:
        description: 运行时段：启动 cron（仅 realtime）
        type: string
      selected_apis:
        items:
          type: string
        type: array
    required:
    - data_source_id
    - name
    - selected_apis
    type: object
  http.CreateTablesForDatasourceReq:
    properties:
      data_source_id:
        type: string
      max_tables:
        type: integer
    required:
    - data_source_id
    type: object
  http.ExecuteSyncPlanReq:
    properties:
      end_dt:
        description: optional, datetime
        type: string
      start_dt:
        description: optional, datetime (RFC3339 or 2006-01-02)
        type: string
    type: object
  http.ExecutionCallbackReq:
    properties:
      error_message:
        type: string
      execution_id:
        type: string
      record_count:
        type: integer
      success:
        type: boolean
    required:
    - execution_id
    type: object
  http.ListAPINamesResp:
    properties:
      api_names:
        items:
          type: string
        type: array
    type: object
  http.PagedResponse:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
      page:
        type: integer
      size:
        type: integer
      total:
        type: integer
    type: object
  http.RefreshMetadataReq:
    properties:
      doc_content:
        description: Optional - workflow fetches from DocURL
        type: string
      doc_type:
        description: Optional - workflow detects type automatically
        type: string
    type: object
  http.Response:
    description: Standard API response wrapper
    properties:
      code:
        example: 0
        type: integer
      data:
        type: object
      message:
        example: success
        type: string
    type: object
  http.SetTokenReq:
    properties:
      expires_at:
        type: string
      token:
        type: string
    required:
    - token
    type: object
  http.UpdateAPISyncStrategyReq:
    properties:
      dependencies:
        items:
          type: string
        type: array
      description:
        type: string
      fixed_param_keys:
        items:
          type: string
        type: array
      fixed_params:
        additionalProperties: true
        type: object
      preferred_param:
        type: string
      required_params:
        items:
          type: string
        type: array
      support_date_range:
        type: boolean
    type: object
  http.UpdateDataSourceCommonDataAPIsReq:
    properties:
      common_data_apis:
        items:
          type: string
        type: array
    type: object
  http.UpdateDataStoreReq:
    properties:
      description:
        type: string
      dsn:
        type: string
      name:
        type: string
      storage_path:
        type: string
      type:
        description: duckdb, clickhouse, postgresql
        type: string
    type: object
  http.UpdateSyncPlanReq:
    properties:
      cron_expression:
        type: string
      data_store_id:
        type: string
      default_execute_params:
        $ref: '#/definitions/sync.ExecuteParams'
      description:
        type: string
      incremental_mode:
        type: boolean
      incremental_start_date_api:
        type: string
      incremental_start_date_column:
        type: string
      name:
        type: string
      plan_mode:
        description: 'PlanMode: "batch" 或 "realtime"'
        type: string
      pull_interval_seconds:
        type: integer
      schedule_end_cron:
        type: string
      schedule_pause_end_cron:
        type: string
      schedule_pause_start_cron:
        type: string
      schedule_start_cron:
        type: string
      selected_apis:
        items:
          type: string
        type: array
    type: object
  metrics.ComputeJobType:
    enum:
    - factor_recalculate
    - signal_recalculate
    - universe_materialize
    type: string
    x-enum-varnames:
    - ComputeJobTypeFactorRecalculate
    - ComputeJobTypeSignalRecalculate
    - ComputeJobTypeUniverseMaterial
  metrics.ComputeRangeType:
    enum:
    - incremental
    - date_range
    - full_rebuild
    type: string
    x-enum-varnames:
    - ComputeRangeIncremental
    - ComputeRangeDateRange
    - ComputeRangeFullRebuild
  metrics.FactorDirection:
    enum:
    - higher_better
    - lower_better
    type: string
    x-enum-varnames:
    - FactorDirectionHigherBetter
    - FactorDirectionLowerBetter
  metrics.FactorSpec:
    properties:
      direction:
        $ref: '#/definitions/metrics.FactorDirection'
    type: object
  metrics.Frequency:
    enum:
    - 1d
    type: string
    x-enum-varnames:
    - FrequencyDaily
  metrics.MetricDef:
    properties:
      category:
        type: string
      created_at:
        type: string
      depends_on:
        items:
          type: string
        type: array
      display_name_cn:
        type: string
      expression:
        type: string
      factor_spec:
        $ref: '#/definitions/metrics.FactorSpec'
      frequency:
        $ref: '#/definitions/metrics.Frequency'
      kind:
        $ref: '#/definitions/metrics.MetricKind'
      metric_id:
        type: string
      signal_spec:
        $ref: '#/definitions/metrics.SignalSpec'
      source_resolution:
        type: string
      status:
        $ref: '#/definitions/metrics.MetricStatus'
      universe_spec:
        $ref: '#/definitions/metrics.UniverseSpec'
      updated_at:
        type: string
      version:
        type: integer
    type: object
  metrics.MetricKind:
    enum:
    - factor
    - signal
    - universe
    type: string
    x-enum-varnames:
    - MetricKindFactor
    - MetricKindSignal
    - MetricKindUniverse
  metrics.MetricStatus:
    enum:
    - draft
    - active
    - paused
    - deprecated
    - archived
    type: string
    x-enum-varnames:
    - MetricStatusDraft
    - MetricStatusActive
    - MetricStatusPaused
    - MetricStatusDeprecated
    - MetricStatusArchived
  metrics.SignalOutputKind:
    enum:
    - bool
    - enum_string
    type: string
    x-enum-varnames:
    - SignalOutputBool
    - SignalOutputEnum
  metrics.SignalSpec:
    properties:
      output_kind:
        $ref: '#/definitions/metrics.SignalOutputKind'
    type: object
  metrics.UniverseSpec:
    properties:
      exclude_delisted:
        type: boolean
      exclude_st:
        type: boolean
      exclude_suspended:
        type: boolean
    type: object
  sync.ExecuteParams:
    properties:
      end_date:
        type: string
      end_time:
        type: string
      start_date:
        type: string
      start_time:
        type: string
      target_db_path:
        type: string
    type: object
info:
  contact: {}
paths:
  /analysis/concept-heat:
    get:
      consumes:
      - application/json
      description: Get concept theme heat for a trade date
      parameters:
      - description: Trade date YYYYMMDD
        in: query
        name: trade_date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      security:
      - BearerAuth: []
      summary: Get concept heat
      tags:
      - Analysis
  /analysis/concept-rotation:
    get:
      consumes:
      - application/json
      description: Get concept rotation stats for a date range
      parameters:
      - description: Start date YYYYMMDD
        in: query
        name: start_date
        required: true
        type: string
      - description: End date YYYYMMDD
        in: query
        name: end_date
        required: true
        type: string
      - default: pct_chg
        description: Rank by field
        in: query
        name: rank_by
        type: string
      - description: Top N
        in: query
        name: top_n
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      security:
      - BearerAuth: []
      summary: Get concept rotation
      tags:
      - Analysis
  /analysis/concept-stocks:
    get:
      consumes:
      - application/json
      description: Get stocks under a concept for a trade date
      parameters:
      - description: Concept code
        in: query
        name: concept_code
        required: true
        type: string
      - description: Trade date YYYYMMDD
        in: query
        name: trade_date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      security:
      - BearerAuth: []
      summary: Get concept stocks
      tags:
      - Analysis
  /analysis/concepts:
    get:
      consumes:
      - application/json
      description: List concept themes with optional source filter
      parameters:
      - description: Source filter
        in: query
        name: source
        type: string
      - default: 100
        description: Limit
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      security:
      - BearerAuth: []
      summary: List concepts
      tags:
      - Analysis
  /analysis/custom-query/query:
    post:
      consumes:
      - application/json
      description: Execute a read-only SQL query (max_rows, timeout_seconds apply)
      parameters:
      - description: sql, max_rows, timeout_seconds
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      security:
      - BearerAuth: []
      summary: Execute read-only query
      tags:
      - Analysis
  /analysis/dragon-tiger:
    get:
      consumes:
      - application/json
      description: Get dragon-tiger (龙虎榜) list with optional trade_date/ts_code filter
      parameters:
      - description: Trade date YYYYMMDD
        in: query
        name: trade_date
        type: string
      - description: Stock code
        in: query
        name: ts_code
        type: string
      - default: 100
        description: Limit
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      security:
      - BearerAuth: []
      summary: Get dragon-tiger list
      tags:
      - Analysis
  /analysis/factors:
    post:
      consumes:
      - application/json
      description: Calculate factor values for given stocks and date range
      parameters:
      - description: ts_codes, start_date, end_date, factors
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      security:
      - BearerAuth: []
      summary: Calculate factors
      tags:
      - Analysis
  /analysis/financial/balancesheet:
    get:
      responses: {}
  /analysis/financial/cashflow:
    get:
      responses: {}
  /analysis/financial/income:
    get:
      responses: {}
  /analysis/financial/indicators:
    get:
      consumes:
      - application/json
      description: Get financial indicators for a stock
      parameters:
      - description: Stock code
        in: query
        name: ts_code
        required: true
        type: string
      - description: Start date YYYYMMDD
        in: query
        name: start_date
        type: string
      - description: End date YYYYMMDD
        in: query
        name: end_date
        type: string
      - default: 50
        description: Limit
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      security:
      - BearerAuth: []
      summary: Get financial indicators
      tags:
      - Analysis
  /analysis/indices:
    get:
      consumes:
      - application/json
      description: List market indices with optional market/category filter
      parameters:
      - description: Market filter
        in: query
        name: market
        type: string
      - description: Category filter
        in: query
        name: category
        type: string
      - default: 100
        description: Limit
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      security:
      - BearerAuth: []
      summary: List indices
      tags:
      - Analysis
  /analysis/kline:
    get:
      consumes:
      - application/json
      description: Get daily/weekly/monthly K-line data for a stock
      parameters:
      - description: Stock code (e.g. 000001.SZ)
        in: query
        name: ts_code
        required: true
        type: string
      - description: Start date YYYYMMDD
        in: query
        name: start_date
        required: true
        type: string
      - description: End date YYYYMMDD
        in: query
        name: end_date
        required: true
        type: string
      - default: none
        description: 'Adjust type: none, qfq, hfq'
        in: query
        name: adjust_type
        type: string
      - default: D
        description: 'Period: D, W, M'
        in: query
        name: period
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      security:
      - BearerAuth: []
      summary: Get K-line data
      tags:
      - Analysis
  /analysis/limit-stats:
    get:
      consumes:
      - application/json
      description: Get daily limit statistics for a date range
      parameters:
      - description: Start date YYYYMMDD
        in: query
        name: start_date
        required: true
        type: string
      - description: End date YYYYMMDD
        in: query
        name: end_date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      security:
      - BearerAuth: []
      summary: Get limit up/down stats
      tags:
      - Analysis
  /analysis/limit-stocks:
    get:
      consumes:
      - application/json
      description: Get list of limit up or limit down stocks for a trade date
      parameters:
      - description: Trade date YYYYMMDD
        in: query
        name: trade_date
        required: true
        type: string
      - default: up
        description: up or down
        in: query
        name: limit_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.Response'
      security:
      - BearerAuth: []
      summary: Get limit up/down stock list
      tags:
      - Analysis
  /analysis/limit-up-comparison:
    get:
      consumes:
