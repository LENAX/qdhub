      tags:
      - DataStores
  /datastores/{id}/schemas/{schemaId}/create:
    post:
      consumes:
      - application/json
      description: Create a table in the data store based on the schema
      parameters:
      - description: Data store ID
        in: path
        name: id
        required: true
        type: string
      - description: Schema ID
        in: path
        name: schemaId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
