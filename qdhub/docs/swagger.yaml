  /datasources/{id}/refresh:
    post:
      consumes:
      - application/json
      description: Parse and import API metadata from the data source documentation
      parameters:
      - description: Data source ID
        in: path
        name: id
        required: true
        type: string
      - description: Document content to parse
        in: body
